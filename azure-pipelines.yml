trigger:  
 branches:
   include:
     - main

pool: 
 name: shivampc

stages:
  - stage: TerraformCheck
    displayName: Terraform Check Stage
    jobs:
      - job: TerraformCheckJob
        steps:
        - task: PowerShell@2
          inputs:
            targetType: 'inline'
            script: 'terraform version'
          