trigger:  
 branches:
   include:
     - main

pool: 
 name: shivampc

stages:
  - stage: TerraformCheckStage
    jobs:
      - job: TerraformJobCheck
        steps:
        - task: PowerShell@2
          inputs:
            targetType: 'inline'
            script: 'terraform version'

        - task: PowerShell@2
          inputs:
            targetType: 'inline'
            script: |
              cd parentmodule
              terraform fmt -check -recursive